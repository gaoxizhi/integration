server:
  # 设置服务器端口
  port: 12528
  servlet:
    # 设置项目根路径
    context-path: /
spring:
  # 配置Redis
  redis:
    # 服务器地址
    host: 127.0.0.1
    # 服务器端口
    port: 6379
    # Redis密码
    password: pass
    # 连接超时时间
    timeout: 60s
    # 连接池最大连接数（使用负值表示没有限制）
    lettuce:
      pool:
        max-active: 50
        # 连接池中的最小空闲连接
        min-idle: 5
        # 连接池中的最大空闲连接
        max-idle: 50
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: 5000

#控制项目日志级别
logging:
  level:
    net:
      gaox: debug
