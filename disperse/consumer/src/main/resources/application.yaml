server:
  # 设置服务器端口
  port: 12529
  servlet:
    # 设置项目根路径
    context-path: /

spring:
  application:
    name: consumer

    # 配置MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
    # 这里有必要添加时区信息，会报错
    url: 'jdbc:mysql://localhost:3306/gaox?serverTimezone=GMT%2B8&characterEncoding=utf-8&useSSL=false&useUnicode=true'

  # RabbitMQ
  rabbitmq:
    addresses: 127.0.0.1:5672
    username: gaox
    password: gaox
    #虚拟主机地址
    virtual-host: /
    #连接超时时间
    connection-timeout: 15000
    publisher-confirms: true
    publisher-returns: true
    template:
      mandatory: true
    #重新投递时间（分钟）
    overtime: 1

#控制项目日志级别
logging:
  level:
    net:
      gaox:
        consumer: debug
