server:
  # 设置服务器端口
  port: 12505
  servlet:
    # 设置项目根路径
    context-path: /

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 1000MB
  # 设置时区
  jackson:
    timezone: Asia/Shanghai
  # 配置MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
    url: jdbc:mysql://localhost:3306/gaox?serverTimezone=GMT%2B8&characterEncoding=utf-8&useSSL=false&useUnicode=true

#mybatis-plus
mybatis-plus:
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: net.gaox.excel.entity
  mapper-locations: classpath:/mybatis/**/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true

#控制项目日志级别
logging:
  level:
    root: info
    com:
      alibaba:
        excel: trace
