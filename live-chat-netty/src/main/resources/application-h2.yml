spring:
  profiles:
    active: dev
---
spring:
  profiles: local
server:
  port: 10001
---
spring:
  profiles: dev
server:
  port: 12511
---
spring:
  # 数据源配置
  datasource:
    platform: h2
    # 使用H2数据库
    driverClassName: org.h2.Driver
    url: jdbc:h2:~/gaox #;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: root
    password: root
    # 数据项配置，项目启动时需要执行的sql脚本
    schema: classpath:db/init.sql
  # 配置h2的远程访问
  h2:
    console:
      settings:
        web-allow-others: true
      # 配置程序开启时就会启动 h2 web console
      enabled: true
      #，进行该配置，你就可以通过YOUR_URL/h2-console访问h2 web console。YOUR_URL是你程序的访问URl
      path: /h2-console
  # 显示sql语句
  jpa:
    show-sql: true
    # 这个必须加，每次启动对应实体
    hibernate:
      ddl-auto: update
    # 是否生成ddl语句
    generate-ddl: false

# 控制项目日志级别
logging:
  level:
    net:
      gaox:
        livechat: debug
    root: debug

live-chat:
  tcp:
    port: 8090
  boss:
    net:
      gaox:
        thread:
          count: 3
  worker:
    net:
      gaox:
        thread:
          count: 5
  so:
    keepalive: true
    backlog: 100